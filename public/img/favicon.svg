<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" fill="#0a0a0a" rx="12"/>
  <g transform="translate(32, 32)" filter="url(#glow)">
    <polygon points="0,-24 21,-12 21,12 0,24 -21,12 -21,-12" fill="none" stroke="url(#neonGrad)" stroke-width="2.5"/>
    <polygon points="0,-15 13,-7.5 13,7.5 0,15 -13,7.5 -13,-7.5" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
    <text x="0" y="8" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="22" font-weight="900" fill="url(#neonGrad)">J</text>
  </g>
</svg>
