<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" fill="#ffffff" rx="12"/>

  <!-- Hexagon icon -->
  <g transform="translate(50, 60)">
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="none" stroke="url(#neonGrad)" stroke-width="2.5"/>
    <polygon points="0,-18 15,-9 15,9 0,18 -15,9 -15,-9" fill="none" stroke="#059669" stroke-width="1" opacity="0.4"/>
    <text x="0" y="8" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="26" font-weight="900" fill="url(#neonGrad)">J</text>
  </g>

  <!-- "juan" text -->
  <text x="90" y="68" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="42" font-weight="200" fill="#1F2937" letter-spacing="2">juan</text>

  <!-- "store" text -->
  <text x="218" y="68" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="42" font-weight="800" fill="url(#neonGrad)" letter-spacing="1">store</text>

  <!-- Dot accent -->
  <circle cx="348" cy="62" r="4" fill="#059669"/>

  <!-- Tagline -->
  <text x="200" y="95" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="9" fill="#059669" opacity="0.6" letter-spacing="6">TECNOLOGÍA · PRECIO · CONFIANZA</text>
</svg>
